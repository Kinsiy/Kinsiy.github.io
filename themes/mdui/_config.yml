# Theme config
router: true

style:
  primary_color: "teal"
  accent_color: "pink"
  bg_color: "#eeeeee"
  hoverable: true

info:
  bg_image: /images/bg-1.png  # 抽屉和归档页的个人资料背景图
  avatar: /images/author.jpg # 头像
  slogan: "Nothing is True." # 描述
  sns: # 此为归档页的联系我提示框的内容，可按照主题默认配置填入您的联系方式。
    Twitter:
      link: https://twitter.com
      fa: 'fa-twitter'
    Facebook:
      link: https://facebook.com
      null_icon: true

# HTML head 用于配置生成的 HTML 文件的头部信息。
head:
  favicon: /images/favicon.png
  high_res_favicon: /images/favicon.png # 高清 favicon
  apple_touch_icon: /images/favicon.png # iOS 主屏按钮图标
  keywords: blog, hexo, mdui

# Search
search: true

# Post
post:
  entry_excerpt: 80 # 首页文章摘要字数
  random_pics: 44 # 文章随机缩略图
  qr_code: false # 文章是否自带二维码
  prism: # 代码染色
    theme: darcula
    line_number: true
  license:
    name: 'CC BY-NC-SA 4.0'
    link:  'https://creativecommons.org/licenses/by-nc-sa/4.0/deed.zh'
  word_count: false # 文章字数统计
  read_time: false # 阅读时长预计
  donate:  # 文章打赏
    wechat:
      link: /img/avatar.png
      fa: 'fa-wechat'
    # paypay:
    #   link: 'https://paypal.com'
    #   fa: 'fa-paypal'

share_menu:
  rss: false
  weibo: false
  twitter: true
  facebook: true
  googleplus: true
  linkedin: true
  qq: false
  telegram: false

