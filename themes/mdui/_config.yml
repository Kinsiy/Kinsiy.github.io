# comment 评论插件
comment:
    use:
    shortname:

# footer
footer:
  since: 2020
  ICP:
  image:
  last_updated: true

# Service Worker
service_worker:

# scss
node_sass:
  debug: false
  outputStyle: compressed
  precision: 5
  sourceComments: false

# Vendors
vendors:
  style_min_css:
  outdatedbrowser_min_js:
  js_min_js:
  custom_head:
  custom_js:

debug: false